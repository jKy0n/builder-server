# ---------- [ Configurações Essenciais ] ----------
set -g default-terminal "xterm-256color"       # Mais compatível que tmux-256color
set -as terminal-overrides ',xterm-256color:RGB,:xterm-256color:delete=\E[3~'

set -g set-clipboard on
set -g allow-passthrough on


# ---------- [ Controle do Mouse ] ----------
set -g mouse on
set -g default-command 'zsh'


# ---------- [ Compatibilidade com alacritty + zsh ] ----------
set -g xterm-keys on
set -s extended-keys on
